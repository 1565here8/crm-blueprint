# CRM — admin host only (not curionilabs.com apex)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name 216.158.237.213 admin.curionilabs.com crm.curionilabs.com hub.curionilabs.com trader.curionilabs.com;

    ssl_certificate /etc/letsencrypt/live/admin.curionilabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.curionilabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# Apex www — Curioni landing only (never etoropros CRM)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name curionilabs.com www.curionilabs.com;

    ssl_certificate /etc/letsencrypt/live/admin.curionilabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.curionilabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/curionilabs-landing;
    index index.html;

    location /mobile {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mobile-trader/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /brand/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 216.158.237.213 admin.curionilabs.com crm.curionilabs.com hub.curionilabs.com trader.curionilabs.com curionilabs.com www.curionilabs.com;
    return 301 https://admin.curionilabs.com$request_uri;
}
